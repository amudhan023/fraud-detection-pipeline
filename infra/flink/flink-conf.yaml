# Flink cluster configuration

jobmanager.rpc.address: jobmanager
jobmanager.rpc.port: 6123
jobmanager.memory.process.size: 1600m

taskmanager.memory.process.size: 2048m
taskmanager.numberOfTaskSlots: 4

parallelism.default: 4

# State backend
state.backend: rocksdb
state.backend.incremental: true
state.checkpoints.dir: file:///flink-checkpoints
state.savepoints.dir: file:///flink-savepoints

# Checkpointing
execution.checkpointing.interval: 30s
execution.checkpointing.mode: EXACTLY_ONCE
execution.checkpointing.timeout: 60s
execution.checkpointing.min-pause: 5s
execution.checkpointing.externalized-checkpoint-retention: RETAIN_ON_CANCELLATION

# Prometheus metrics reporter
metrics.reporter.prom.factory.class: org.apache.flink.metrics.prometheus.PrometheusReporterFactory
metrics.reporter.prom.port: 9249

# Network
taskmanager.network.numberOfBuffers: 2048
taskmanager.network.memory.fraction: 0.1

# Logging
env.java.opts.jobmanager: -Dlog4j2.configurationFile=/opt/flink/conf/log4j-console.properties
env.java.opts.taskmanager: -Dlog4j2.configurationFile=/opt/flink/conf/log4j-console.properties

# Web UI
web.submit.enable: true
