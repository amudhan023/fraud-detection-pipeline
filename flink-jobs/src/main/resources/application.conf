pipeline {
  kafka {
    bootstrap-servers = "kafka:29092"
    bootstrap-servers = ${?KAFKA_BOOTSTRAP_SERVERS}

    schema-registry-url = "http://schema-registry:8081"
    schema-registry-url = ${?SCHEMA_REGISTRY_URL}

    topics {
      transactions-raw      = "transactions.raw"
      transactions-scored   = "transactions.scored"
      transactions-anomalies = "transactions.anomalies"
      analytics-spend       = "analytics.spend"
      enrichment-merchants  = "enrichment.merchants"
      enrichment-accounts   = "enrichment.accounts"
    }

    consumer {
      group-id-enrich-score   = "flink-enrich-score-cg"
      group-id-anomaly        = "flink-anomaly-cg"
      group-id-spend          = "flink-spend-cg"
      auto-offset-reset       = "latest"
    }
  }

  flink {
    checkpoint-interval-ms   = 30000
    checkpoint-timeout-ms    = 60000
    min-pause-between-ckpts  = 5000
    watermark-idle-timeout-ms = 10000
    late-event-tolerance-ms  = 5000
    late-event-drop-after-ms = 10000
    parallelism              = 4
  }

  postgres {
    url      = "jdbc:postgresql://postgres:5432/frauddb"
    url      = ${?POSTGRES_URL}
    user     = "frauduser"
    user     = ${?POSTGRES_USER}
    password = "fraudpass"
    password = ${?POSTGRES_PASSWORD}
  }

  iceberg {
    catalog-name    = "fraud_catalog"
    warehouse-path  = "s3://fraud-warehouse"
    warehouse-path  = ${?ICEBERG_WAREHOUSE_PATH}
  }

  anomaly {
    velocity {
      max-transactions   = 10
      max-transactions   = ${?ANOMALY_VELOCITY_MAX_TXN}
      window-seconds     = 60
      window-seconds     = ${?ANOMALY_VELOCITY_WINDOW_SECS}
    }

    amount-spike {
      z-score-threshold  = 3.0
      z-score-threshold  = ${?ANOMALY_ZSCORE_THRESHOLD}
      min-history-count  = 5
      min-history-count  = ${?ANOMALY_ZSCORE_MIN_HISTORY}
    }

    geo-travel {
      max-speed-kmh      = 900.0
      max-speed-kmh      = ${?ANOMALY_GEO_MAX_SPEED_KMH}
    }
  }

  otel {
    endpoint = "http://otel-collector:4317"
    endpoint = ${?OTEL_EXPORTER_OTLP_ENDPOINT}
    service-name = "fraud-pipeline"
  }
}
